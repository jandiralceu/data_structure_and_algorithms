name: data_structure_develop
on:
  push:
    branches:
      - main
jobs:
  lint_and_testing:
    runs-on: ubuntu-22.04
    environment:
      name: "production"
    steps:
      - uses: actions/checkout@v3
      - name: ⏳ Installing dependencies
        run: yarn install
      - name: 👀 Check lint
        run: yarn lint:check
      - name: 🌡 Running tests
        run: yarn test:ci
      - uses: codecov/codecov-action@v3
        name: 🚀 Upload to codecov
        with:
          token: ${{ secrets.CODECOV_SECRET }}
